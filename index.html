<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMS - Farmacovigilancia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>SISTEMA PERUANO DE FARMACOVIGILANCIA Y TECNOVIGILANCIA</h1>

    <h2>FORMATO DE NOTIFICACIÓN DE SOSPECHAS DE REACCIONES ADVERSAS</h2>

    <section>
        <h3>A. DATOS DEL PACIENTE</h3>

        <label>Nombres o iniciales</label>
        <input type="text" id="nombre">

        <label>Edad</label>
        <input type="number" id="edad">

        <label>Sexo</label>
        <select id="sexo">
            <option>F</option>
            <option>M</option>
        </select>

        <label>Peso (kg)</label>
        <input type="number" id="peso">
    </section>

    <br>

    <button>Enviar</button>

</body>
</html>
