<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMS - Farmacovigilancia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="contenedor">

        <div class="encabezado">
            <h2>SISTEMA PERUANO DE FARMACOVIGILANCIA Y TECNOVIGILANCIA</h2>

            <h3>
                FORMATO DE NOTIFICACIÓN DE SOSPECHAS DE REACCIONES ADVERSAS
                A MEDICAMENTOS U OTROS PRODUCTOS FARMACÉUTICOS
            </h3>

            <h4>CONFIDENCIAL</h4>
        </div>

        <!-- SECCIÓN A -->

        <div class="bloque-rams">

            <div class="cabecera-seccion">
                A. DATOS DEL PACIENTE
            </div>

            <div class="fila">

                <div class="campo grande">
                    <label>Nombres o Iniciales (*)</label>
                    <input type="text" id="nombre">
                </div>

                <div class="campo edad">
                    <label>Edad (*)</label>
                    <input type="number" id="edad">
                </div>

                <div class="campo sexo">
                    <label>Sexo (*)</label>

                    <div class="sexo-opciones">
                        <label>
                            <input type="radio" name="sexo" value="F">
                            F
                        </label>

                        <label>
                            <input type="radio" name="sexo" value="M">
                            M
                        </label>
                    </div>
                </div>

            </div>

            <div class="fila">

                <div class="campo peso">
                    <label>Peso (Kg)</label>
                    <input type="number" id="peso">
                </div>

                <div class="campo grande">
                    <label>Historia Clínica o DNI</label>
                    <input type="text" id="dni">
                </div>

            </div>

            <div class="fila-completa">

                <label>Establecimiento</label>
                <input type="text" id="establecimiento">

            </div>

            <div class="fila-completa">

                <label>Diagnóstico Principal</label>
                <input type="text" id="diagnostico">

            </div>

        </div>
        <!-- SECCIÓN B -->

<div class="bloque-rams">

    <div class="cabecera-seccion">
        B. DATOS DE LA SOSPECHA DE REACCIÓN ADVERSA
    </div>

    <div class="fila-opciones">

        <label>
            <input type="checkbox" id="reaccion">
            Reacción Adversa
        </label>

        <label>
            <input type="checkbox" id="error">
            Error de Medicación
        </label>

        <label>
            <input type="checkbox" id="calidad">
            Problema de Calidad
        </label>

        <label>
            <input type="checkbox" id="otro">
            Otro
        </label>

    </div>

    <div class="fila-completa">

        <label>Descripción de la reacción adversa</label>

        <textarea id="descripcion" rows="6"></textarea>

    </div>

    <div class="fila">

        <div class="campo">
            <label>Fecha de inicio</label>
            <input type="date" id="fechaInicio">
        </div>

        <div class="campo">
            <label>Fecha final</label>
            <input type="date" id="fechaFin">
        </div>

    </div>

    <div class="fila-gravedad">

        <span>Gravedad:</span>

        <label>
            <input type="radio" name="gravedad" value="leve">
            Leve
        </label>

        <label>
            <input type="radio" name="gravedad" value="moderada">
            Moderada
        </label>

        <label>
            <input type="radio" name="gravedad" value="grave">
            Grave
        </label>

    </div>

    <div class="fila-gravedad">

        <span>Desenlace:</span>

        <label>
            <input type="radio" name="desenlace" value="recuperado">
            Recuperado
        </label>

        <label>
            <input type="radio" name="desenlace" value="recuperandose">
            Recuperándose
        </label>

        <label>
            <input type="radio" name="desenlace" value="no_recuperado">
            No recuperado
        </label>

        <label>
            <input type="radio" name="desenlace" value="muerte">
            Muerte
        </label>

    </div>

</div>

        <button id="btnEnviar">
            Enviar Formulario
        </button>

    </div>

</body>

</html>
